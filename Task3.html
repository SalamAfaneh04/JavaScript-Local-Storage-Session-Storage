    <script>
        const users =JSON.parse(localStorage.getItem('UsersTask3')) || [
            { name: "Rama" },
            { name: "Ahmad" },
            { name: "Ali" },
            { name: "Sara" },
            { name: "Lana" }
        ];

        const AllUsers = document.getElementById('user');
        const search = document.getElementById('Search');
        const btnClear = document.getElementById('clear');
        const btnDelete = document.getElementsByClassName('btnD');

        function displayUsers(filteredUsers) {
            AllUsers.innerHTML = ""; 
            filteredUsers.forEach(user => {
                const card = document.createElement('div');
                card.classList.add('user-card'); 

                card.innerHTML = `
                    <div class="user-info">
                        <span class="user-name">${user.name}</span>
                    </div>
                    <button class="btnD">Delete</button>
                `;

                card.querySelector('.btnD').addEventListener('click', () => {
                    card.remove();
                });

                AllUsers.appendChild(card);
            });
        }

        //Display All users
        displayUsers(users);

        //Clear Button
        btnClear.addEventListener('click', () => {
            search.value = "";
            displayUsers(users);
        });

        //Search Bar
        search.addEventListener('input', () => {
            const searchValue = search.value.toLowerCase();
            
            const filtered = users.filter(user => 
                user.name.toLowerCase().includes(searchValue)
            );

            displayUsers(filtered);
        });
    </script>
